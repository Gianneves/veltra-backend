version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: veltra_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - veltra_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: veltra_cache
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - veltra_redis_data:/data

volumes:
  veltra_postgres_data:
  veltra_redis_data: